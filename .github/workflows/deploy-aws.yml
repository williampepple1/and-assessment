name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: meridian-support-chatbot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Ensure ECR repository exists
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}"

      - name: Read ECR repository URL
        id: ecr
        working-directory: terraform
        run: echo "repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY_URL: ${{ steps.ecr.outputs.repository_url }}
        run: |
          docker build -t "${ECR_REPOSITORY_URL}:${IMAGE_TAG}" .
          docker push "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"

      - name: Deploy App Runner service
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="image_tag=${{ github.sha }}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}"

      - name: Show service URL
        working-directory: terraform
        run: terraform output app_runner_service_url
