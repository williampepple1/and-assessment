name: CI and Deploy AWS

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: meridian-support-chatbot
  TF_STATE_BUCKET: meridian-support-chatbot-tfstate-082499810047-us-east-1
  TF_STATE_KEY: terraform.tfstate

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build container
        run: docker build -t meridian-support-chatbot:test .

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          if ! aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            aws s3api create-bucket --bucket "${TF_STATE_BUCKET}" --region "${AWS_REGION}"
            aws s3api put-bucket-versioning \
              --bucket "${TF_STATE_BUCKET}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${TF_STATE_BUCKET}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"

      - name: Import existing Terraform resources if needed
        working-directory: terraform
        run: |
          import_if_missing() {
            local address="$1"
            local import_id="$2"

            if ! terraform state show "${address}" >/dev/null 2>&1; then
              terraform import \
                -var="aws_region=${AWS_REGION}" \
                -var="project_name=${PROJECT_NAME}" \
                -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
                "${address}" "${import_id}"
            fi
          }

          if ! terraform state show aws_ecr_repository.app >/dev/null 2>&1; then
            if aws ecr describe-repositories --repository-names "${PROJECT_NAME}" --region "${AWS_REGION}" >/dev/null 2>&1; then
              import_if_missing aws_ecr_repository.app "${PROJECT_NAME}"
            fi
          fi

          LOG_GROUP_NAME="/aws/apprunner/${PROJECT_NAME}"
          if aws logs describe-log-groups --log-group-name-prefix "${LOG_GROUP_NAME}" --region "${AWS_REGION}" \
            --query "logGroups[?logGroupName=='${LOG_GROUP_NAME}'].logGroupName" --output text | grep -q "${LOG_GROUP_NAME}"; then
            import_if_missing aws_cloudwatch_log_group.app "${LOG_GROUP_NAME}"
          fi

          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "${PROJECT_NAME}/openai-api-key" \
            --region "${AWS_REGION}" \
            --query ARN \
            --output text 2>/dev/null || true)
          if [ -n "${SECRET_ARN}" ] && [ "${SECRET_ARN}" != "None" ]; then
            import_if_missing aws_secretsmanager_secret.openai_api_key "${SECRET_ARN}"
          fi

          ECR_ACCESS_ROLE="${PROJECT_NAME}-ecr-access"
          if aws iam get-role --role-name "${ECR_ACCESS_ROLE}" >/dev/null 2>&1; then
            import_if_missing aws_iam_role.apprunner_ecr_access "${ECR_ACCESS_ROLE}"
            if aws iam list-attached-role-policies --role-name "${ECR_ACCESS_ROLE}" \
              --query "AttachedPolicies[?PolicyArn=='arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess'].PolicyArn" \
              --output text | grep -q "AWSAppRunnerServicePolicyForECRAccess"; then
              import_if_missing aws_iam_role_policy_attachment.apprunner_ecr_access \
                "${ECR_ACCESS_ROLE}/arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess"
            fi
          fi

          INSTANCE_ROLE="${PROJECT_NAME}-instance"
          INSTANCE_POLICY="${PROJECT_NAME}-read-secrets"
          if aws iam get-role --role-name "${INSTANCE_ROLE}" >/dev/null 2>&1; then
            import_if_missing aws_iam_role.apprunner_instance "${INSTANCE_ROLE}"
            if aws iam get-role-policy --role-name "${INSTANCE_ROLE}" --policy-name "${INSTANCE_POLICY}" >/dev/null 2>&1; then
              import_if_missing aws_iam_role_policy.apprunner_secrets "${INSTANCE_ROLE}:${INSTANCE_POLICY}"
            fi
          fi

          SERVICE_ARN=$(aws apprunner list-services \
            --region "${AWS_REGION}" \
            --query "ServiceSummaryList[?ServiceName=='${PROJECT_NAME}'].ServiceArn | [0]" \
            --output text 2>/dev/null || true)
          if [ -n "${SERVICE_ARN}" ] && [ "${SERVICE_ARN}" != "None" ]; then
            import_if_missing aws_apprunner_service.app "${SERVICE_ARN}"
          fi

      - name: Ensure ECR repository exists
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}"

      - name: Read ECR repository URL
        id: ecr
        working-directory: terraform
        run: echo "repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY_URL: ${{ steps.ecr.outputs.repository_url }}
        run: |
          docker build -t "${ECR_REPOSITORY_URL}:${IMAGE_TAG}" .
          docker push "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"

      - name: Deploy App Runner service
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="image_tag=${{ github.sha }}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}"

      - name: Show service URL
        working-directory: terraform
        run: terraform output app_runner_service_url
